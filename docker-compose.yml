name: legal-transcribe-app

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: transcribe
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user -d transcribe']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://user:pass@postgres:5432/transcribe
      REDIS_URL: redis://redis:6379/0
      FILE_STORAGE_PATH: /data
      PORT: '3001'
    ports:
      - '3001:3001'
    volumes:
      - uploads:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: celery -A worker.celery_app worker --loglevel=info
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://user:pass@postgres:5432/transcribe
      REDIS_URL: redis://redis:6379/0
      FILE_STORAGE_PATH: /data
    volumes:
      - uploads:/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  uploads:
